version = 3.10.6
runner.dialect = scala3
maxColumn = 120
project {
  excludeFilters = [".*\\.sbt"]
  git = true
}
rewrite {
  imports.sort = ascii
  rules = [Imports, RedundantBraces, RedundantParens]
  scala3 {
    convertToNewSyntax = true
    removeOptionalBraces = true
  }
  trailingCommas.style = never
}
spaces.inImportCurlyBraces = true
