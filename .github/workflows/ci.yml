name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  scalafmt:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'sbt'

      - name: Set up sbt
        uses: sbt/setup-sbt@v1

      - name: Check formatting
        run: sbt scalafmtCheckAll

  test:
    needs: scalafmt
    runs-on: ubuntu-latest

    services:
      postgres:
        image: ghcr.io/pgmq/pg18-pgmq:v1.10.0
        env:
          POSTGRES_USER: pgmq
          POSTGRES_PASSWORD: pgmq
          POSTGRES_DB: pgmq
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U pgmq"
          --health-interval 2s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'sbt'

      - name: Set up sbt
        uses: sbt/setup-sbt@v1

      - name: Create PGMQ extension
        run: PGPASSWORD=pgmq psql -h localhost -U pgmq -d pgmq -c "CREATE EXTENSION pgmq;"

      - name: Run JVM unit and integration tests with coverage
        run: sbt coverage coreJVM/test circeJVM/test doobie/test integration/test coverageReport

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v5
        with:
          token: ${{ secrets.CODECOV_TOKEN }}

      - name: Run JS tests
        run: sbt coreJS/test circeJS/test

      - name: Run Native tests
        run: sbt coreNative/test circeNative/test
